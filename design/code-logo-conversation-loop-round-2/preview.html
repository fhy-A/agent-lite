<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Conversation Loop 第二轮</title>
  <style>
    :root { color: #182230; background: #eef1f5; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 30px 40px 24px; border-bottom: 1px solid #d9dee7; background: #fafbfc; }
    .eyebrow { color: #667085; font: 700 11px Consolas, monospace; letter-spacing: .14em; }
    h1 { margin: 8px 0 7px; font-size: 28px; letter-spacing: -.7px; }
    header p { margin: 0; color: #667085; font-size: 13px; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px 28px 42px; }
    .principle { margin: 0 0 18px; color: #667085; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 16px; }
    .card { overflow: hidden; border: 1px solid #d9dee7; border-radius: 16px; background: #fff; box-shadow: 0 10px 24px rgba(24,34,48,.045); }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 15px 17px 13px; border-bottom: 1px solid #e8ebf0; }
    .number { color: #98a2b3; font: 800 10px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 16px; }
    .tag { color: #667085; font-size: 10px; }
    .stage { display: grid; min-height: 218px; place-items: center; background: #fdfdfd; }
    .stage img { width: 156px; height: 156px; }
    .meta { display: flex; min-height: 75px; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 16px; border-top: 1px solid #e8ebf0; background: #fafbfc; }
    .note { max-width: 245px; color: #667085; font-size: 11px; line-height: 1.5; }
    .sizes { display: flex; align-items: center; gap: 8px; }
    .sizes img { display: block; }
    .s16 { width: 16px; height: 16px; }
    .s24 { width: 24px; height: 24px; }
    .s32 { width: 32px; height: 32px; }
    @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { header { padding-inline: 24px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">CODE · CONVERSATION LOOP · REFINED SILHOUETTES</div>
    <h1>保留意向，重新设计轮廓</h1>
    <p>不复刻手绘线条，只保留右上输入、中心转换、左下回答的对话循环。</p>
  </header>
  <main>
    <p class="principle">灰色路径代表用户输入，深色路径代表模型回答；颜色仅用于讲解结构。</p>
    <section class="grid" id="grid"></section>
  </main>
  <script>
    const concepts = [
      ["01-balanced-exchange.svg", "01", "Balanced Exchange", "平衡", "重新校正曲率与留白，保留开放感，同时让整体重心更稳定。"],
      ["02-dialogue-spiral.svg", "02", "Dialogue Spiral", "循环", "两条路径向中心收拢，形成更明显的处理与返回关系。"],
      ["03-soft-relay.svg", "03", "Soft Relay", "接力", "把路径理解成一次交接，内侧端点沿对角线自然传递。"],
      ["04-rounded-frame.svg", "04", "Rounded Frame", "科技", "以圆角框架组织曲线，轮廓更克制，也更适合产品图标。"],
      ["05-ribbon-flow.svg", "05", "Ribbon Flow", "品牌", "改用定制面形而非普通描边，端部和粗细更像正式品牌符号。"],
      ["06-mono-glyph.svg", "06", "Mono Glyph", "单色", "去掉讲解色后检验图形是否仍能表达对话循环。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file,no,name,tag,note]) => `
      <article class="card">
        <div class="card-head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="tag">${tag}</span></div>
        <div class="stage"><img src="${file}" alt="${name}"></div>
        <div class="meta"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div>
      </article>
    `).join("");
  </script>
</body>
</html>
