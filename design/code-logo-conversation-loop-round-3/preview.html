<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Conversation Loop 规范化方案</title>
  <style>
    :root { color: #172033; background: #eef1f5; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 30px 40px 24px; border-bottom: 1px solid #d8dee8; background: #fafbfc; }
    .eyebrow { color: #64748b; font: 700 11px Consolas, monospace; letter-spacing: .14em; }
    h1 { margin: 8px 0 7px; font-size: 28px; letter-spacing: -.7px; }
    header p { margin: 0; color: #64748b; font-size: 13px; }
    main { max-width: 1340px; margin: 0 auto; padding: 24px 28px 44px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(300px, 1fr)); gap: 18px; }
    .card { overflow: hidden; border: 1px solid #d8dee8; border-radius: 17px; background: #fff; box-shadow: 0 12px 28px rgba(23,32,51,.05); }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px 18px 14px; border-bottom: 1px solid #e7ebf0; }
    .number { color: #94a3b8; font: 800 10px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 17px; }
    .tag { padding: 4px 7px; border-radius: 6px; background: #f1f5f9; color: #64748b; font-size: 10px; }
    .visuals { display: grid; grid-template-columns: 1.15fr .85fr; min-height: 230px; }
    .primary, .construction { display: grid; place-items: center; }
    .primary img { width: 160px; height: 160px; }
    .construction { border-left: 1px solid #edf0f4; background: #fafbfc; }
    .construction img { width: 132px; height: 132px; }
    .system { padding: 13px 17px; border-top: 1px solid #e7ebf0; color: #64748b; font: 11px/1.5 Consolas, monospace; }
    .lockups { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #e7ebf0; }
    .lockup { display: flex; min-height: 82px; align-items: center; gap: 10px; padding: 14px 16px; }
    .lockup + .lockup { border-left: 1px solid #e7ebf0; background: #172033; color: #fff; }
    .lockup img { width: 42px; height: 42px; }
    .lockup.dark img { filter: brightness(0) invert(1); }
    .wordmark strong { display: block; font-size: 19px; letter-spacing: -.3px; }
    .wordmark span { display: block; margin-top: 3px; color: #94a3b8; font-size: 9px; }
    .foot { display: flex; min-height: 71px; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; border-top: 1px solid #e7ebf0; background: #fafbfc; }
    .note { max-width: 245px; color: #64748b; font-size: 10.5px; line-height: 1.45; }
    .sizes { display: flex; align-items: center; gap: 8px; }
    .sizes img { display: block; }
    .s16 { width: 16px; height: 16px; }
    .s24 { width: 24px; height: 24px; }
    .s32 { width: 32px; height: 32px; }
    @media (max-width: 1040px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">CODE · CONVERSATION LOOP · LOGO SYSTEM STUDY</div>
    <h1>三个规范化几何方案</h1>
    <p>统一采用 160 × 160 母版、单色主标和明确安全区；构造色只用于解释用户输入与模型回答。</p>
  </header>
  <main><section class="grid" id="grid"></section></main>
  <script>
    const concepts = [
      ["01-circular-relay.svg", "01-construction.svg", "01", "Offset Relay", "错位圆环", "R52 · T16 · Gap30° · Offset±5", "右半圆上移、左半圆下移，在保持圆环规范的同时强化输入与回答的对角流向。"],
      ["02-tangent-loop.svg", "02-construction.svg", "02", "Tangent Loop", "双圆体系", "R25.5 · T14 · Gap50° · Safe24", "两个 C 的外轮廓在中心精确相切，形成对角线上的输入与返回闭环。"],
      ["03-superellipse-exchange.svg", "03-construction.svg", "03", "Superellipse Exchange", "超椭圆体系", "120×120 · T16 · Axis45° · Safe12", "由圆角菱形母体拆分双 C，既保留亲和力，也带有工具产品的秩序感。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file, construction, no, name, tag, system, note]) => `
      <article class="card">
        <div class="card-head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="tag">${tag}</span></div>
        <div class="visuals"><div class="primary"><img src="${file}" alt="${name}"></div><div class="construction"><img src="${construction}" alt="${name} 构造图"></div></div>
        <div class="system">${system}</div>
        <div class="lockups">
          <div class="lockup"><img src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>AI coding workspace</span></div></div>
          <div class="lockup dark"><img src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>AI coding workspace</span></div></div>
        </div>
        <div class="foot"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div>
      </article>
    `).join("");
  </script>
</body>
</html>
