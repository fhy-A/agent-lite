<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Conversation Loop 草图</title>
  <style>
    :root {
      color: #182230;
      background: #eef1f5;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header {
      padding: 30px 40px 24px;
      border-bottom: 1px solid #d9dee7;
      background: #fafbfc;
    }
    .eyebrow {
      color: #667085;
      font: 700 11px Consolas, monospace;
      letter-spacing: .14em;
    }
    h1 { margin: 8px 0 7px; font-size: 28px; letter-spacing: -.7px; }
    header p { margin: 0; color: #667085; font-size: 13px; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px 28px 42px; }
    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      color: #667085;
      font-size: 12px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 18px; height: 3px; border-radius: 999px; background: #667085; }
    .swatch.answer { background: #182230; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 16px; }
    .card {
      overflow: hidden;
      border: 1px solid #d9dee7;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(24, 34, 48, .045);
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 15px 17px 13px;
      border-bottom: 1px solid #e8ebf0;
    }
    .number { color: #98a2b3; font: 800 10px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 16px; }
    .tag { color: #667085; font-size: 10px; }
    .stage {
      display: grid;
      min-height: 218px;
      place-items: center;
      background: #fdfdfd;
    }
    .stage img { width: 156px; height: 156px; }
    .meta {
      display: flex;
      min-height: 75px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 16px;
      border-top: 1px solid #e8ebf0;
      background: #fafbfc;
    }
    .note { max-width: 245px; color: #667085; font-size: 11px; line-height: 1.5; }
    .sizes { display: flex; align-items: center; gap: 8px; }
    .sizes img { display: block; }
    .s16 { width: 16px; height: 16px; }
    .s24 { width: 24px; height: 24px; }
    .s32 { width: 32px; height: 32px; }
    @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { header { padding-inline: 24px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">CODE · CONVERSATION LOOP · STRUCTURE STUDY</div>
    <h1>双 C 对话环：第一轮结构草图</h1>
    <p>右上端代表用户消息进入，左下端代表模型回答返回；本轮只比较轮廓，不讨论正式配色。</p>
  </header>
  <main>
    <div class="legend">
      <span><i class="swatch"></i>用户路径</span>
      <span><i class="swatch answer"></i>模型路径</span>
      <span>右上输入 → 中间处理 → 左下回答</span>
    </div>
    <section class="grid" id="grid"></section>
  </main>
  <script>
    const concepts = [
      ["01-original-flow.svg", "01", "Original Flow", "原始意向", "最接近手绘稿：轮廓开放、错位明显，强调消息进入与回答返回。"],
      ["02-compact-dialogue.svg", "02", "Compact Dialogue", "紧凑", "收紧外轮廓和开口，更接近可直接放进应用图标的比例。"],
      ["03-diagonal-motion.svg", "03", "Diagonal Motion", "动势", "加大右上到左下的倾斜感，强化请求与响应之间的流动。"],
      ["04-inner-dialogue.svg", "04", "Inner Dialogue", "内聚", "让两个内侧端点更靠近，突出中间发生的 Agent 处理过程。"],
      ["05-terminal-cut.svg", "05", "Terminal Cut", "科技感", "保留柔和曲线，以平切端点增加终端与代码工具的精确感。"],
      ["06-mono-loop.svg", "06", "Mono Loop", "单色", "不依赖颜色区分，只验证双 C 轮廓本身能否成立。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file, no, name, tag, note]) => `
      <article class="card">
        <div class="card-head">
          <div><span class="number">${no}</span><h2>${name}</h2></div>
          <span class="tag">${tag}</span>
        </div>
        <div class="stage"><img src="${file}" alt="${name}"></div>
        <div class="meta">
          <div class="note">${note}</div>
          <div class="sizes">
            <img class="s16" src="${file}" alt="">
            <img class="s24" src="${file}" alt="">
            <img class="s32" src="${file}" alt="">
          </div>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
