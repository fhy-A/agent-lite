<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Ribbon Weave</title>
  <desc id="desc">Two C ribbons alternate above and below to form an interlocked ring.</desc>
  <defs>
    <linearGradient id="weave-left" x1="10" y1="14" x2="38" y2="50" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#22D3EE"/></linearGradient>
    <linearGradient id="weave-right" x1="54" y1="14" x2="26" y2="50" gradientUnits="userSpaceOnUse"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
    <mask id="left-weave-mask"><rect width="64" height="64" fill="#fff"/><rect x="29.5" y="46" width="5" height="8" rx="2.5" fill="#000"/></mask>
    <mask id="right-weave-mask"><rect width="64" height="64" fill="#fff"/><rect x="29.5" y="10" width="5" height="8" rx="2.5" fill="#000"/></mask>
  </defs>
  <path d="M31 14h-2c-12 0-19 8-19 18s7 18 19 18h2" fill="none" stroke="url(#weave-left)" stroke-width="8" stroke-linecap="round" mask="url(#left-weave-mask)"/>
  <path d="M33 14h2c12 0 19 8 19 18s-7 18-19 18h-2" fill="none" stroke="url(#weave-right)" stroke-width="8" stroke-linecap="round" mask="url(#right-weave-mask)"/>
</svg>
