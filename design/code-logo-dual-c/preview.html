<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Dual C</title>
  <style>
    :root { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; color: #172033; background: #edf1f6; }
    * { box-sizing: border-box; } body { margin: 0; }
    header { padding: 28px 37px 23px; border-bottom: 1px solid #d8dee8; background: #fafbfd; }
    .eyebrow { color: #2563eb; font: 700 11px Consolas, monospace; letter-spacing: .13em; }
    h1 { margin: 7px 0 6px; font-size: 28px; letter-spacing: -.8px; } header p { margin: 0; color: #697386; font-size: 13px; }
    main { max-width: 1380px; margin: 0 auto; padding: 23px 30px 42px; }.grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 16px; }
    .card { overflow: hidden; border: 1px solid #d9dfe8; border-radius: 15px; background: #fff; box-shadow: 0 11px 27px rgba(29,43,67,.055); }
    .head { display: flex; align-items: flex-start; justify-content: space-between; padding: 15px 17px 13px; border-bottom: 1px solid #e6eaf0; }.number { color: #2563eb; font: 800 10px Consolas, monospace; } h2 { margin: 3px 0 0; font-size: 16px; }.tag { padding: 4px 7px; border-radius: 5px; background: #eff4fb; color: #66748a; font-size: 10px; }
    .sample { display: flex; min-height: 112px; align-items: center; gap: 15px; padding: 20px; }.sample.dark { border-top: 1px solid #e6eaf0; background: #151719; color: #f7f8fa; }.mark { width: 62px; height: 62px; flex: 0 0 auto; }.wordmark strong { display: block; font-size: 20px; letter-spacing: -.3px; }.wordmark span { display: block; margin-top: 5px; color: #7a8495; font-size: 10.5px; }.dark .wordmark span { color: #929aa7; }
    .foot { display: flex; min-height: 68px; align-items: center; justify-content: space-between; gap: 13px; padding: 13px 16px; border-top: 1px solid #e6eaf0; background: #fbfcfd; }.note { max-width: 235px; color: #697386; font-size: 10.5px; line-height: 1.45; }.sizes { display: flex; align-items: center; gap: 8px; }.sizes img { display: block; }.s16 { width: 16px; height: 16px; }.s24 { width: 24px; height: 24px; }.s32 { width: 32px; height: 32px; }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); } } @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><div class="eyebrow">HUMAN × AGENT · DUAL C</div><h1>两个 C，轻触成协作闭环</h1><p>移除抢眼的交叉结构，让两条路径通过切线、微小负空间和颜色关系完成连接。</p></header>
  <main><section class="grid" id="grid"></section></main>
  <script>
    const concepts = [
      ["01-balanced-lock.svg", "01", "Balanced Join", "轻触", "两个圆角端点刚好相接，没有重叠，是最干净的基础母版。"],
      ["02-ribbon-weave.svg", "02", "Quiet Weave", "弱穿插", "只保留非常短的上下层关系，穿插成为近看才发现的细节。"],
      ["03-fluid-couple.svg", "03", "Fluid Join", "柔和", "宽路径在中心自然贴合，用渐变替代明显的结构交叉。"],
      ["04-angular-lock.svg", "04", "Angular Join", "棱角", "折线双 C 在端点切线相接，保留辨识度但去掉中心锯齿。"],
      ["05-hooked-orbit.svg", "05", "Soft Clasp", "内扣", "端点轻微向内弯折但彼此留白，表达连接而不是碰撞。"],
      ["06-mono-knot.svg", "06", "Mono Gap", "单色", "使用两处稳定负空间区分双 C，适合极小图标与印刷。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file,no,name,tag,note]) => `<article class="card"><div class="head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="tag">${tag}</span></div><div class="sample"><img class="mark" src="${file}" alt="${name}"><div class="wordmark"><strong>Code</strong><span>本地 AI 编程工作台</span></div></div><div class="sample dark"><img class="mark" src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>Human × Agent workspace</span></div></div><div class="foot"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div></article>`).join("");
  </script>
</body>
</html>
