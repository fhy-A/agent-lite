<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Pure Intent</title>
  <style>
    :root { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; color: #172033; background: #edf1f6; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 28px 37px 23px; border-bottom: 1px solid #d8dee8; background: #fafbfd; }
    .eyebrow { color: #2563eb; font: 700 11px Consolas, monospace; letter-spacing: .13em; }
    h1 { margin: 7px 0 6px; font-size: 28px; letter-spacing: -.8px; }
    header p { margin: 0; color: #697386; font-size: 13px; }
    main { max-width: 1380px; margin: 0 auto; padding: 23px 30px 42px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 16px; }
    .card { overflow: hidden; border: 1px solid #d9dfe8; border-radius: 15px; background: #fff; box-shadow: 0 11px 27px rgba(29, 43, 67, .055); }
    .head { display: flex; align-items: flex-start; justify-content: space-between; padding: 15px 17px 13px; border-bottom: 1px solid #e6eaf0; }
    .number { color: #2563eb; font: 800 10px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 16px; }.tag { padding: 4px 7px; border-radius: 5px; background: #eff4fb; color: #66748a; font-size: 10px; }
    .sample { display: flex; min-height: 112px; align-items: center; gap: 15px; padding: 20px; }
    .sample.dark { border-top: 1px solid #e6eaf0; background: #151719; color: #f7f8fa; }
    .mark { width: 61px; height: 61px; flex: 0 0 auto; }.wordmark strong { display: block; font-size: 20px; letter-spacing: -.3px; }.wordmark span { display: block; margin-top: 5px; color: #7a8495; font-size: 10.5px; }.dark .wordmark span { color: #929aa7; }
    .foot { display: flex; min-height: 67px; align-items: center; justify-content: space-between; gap: 13px; padding: 13px 16px; border-top: 1px solid #e6eaf0; background: #fbfcfd; }
    .note { max-width: 235px; color: #697386; font-size: 10.5px; line-height: 1.45; }.sizes { display: flex; align-items: center; gap: 8px; }.sizes img { display: block; }.s16 { width: 16px; height: 16px; }.s24 { width: 24px; height: 24px; }.s32 { width: 32px; height: 32px; }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); } } @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><div class="eyebrow">AI CODING · PURE INTENT</div><h1>不依赖名称的六种意向</h1><p>去掉字母与终端外壳，只保留“理解、生成、执行、验证”的动态科技感。</p></header>
  <main><section class="grid" id="grid"></section></main>
  <script>
    const concepts = [
      ["01-neural-weave.svg", "01", "Neural Weave", "推理编织", "两条思维流交织为代码路径，智能但不使用传统神经节点。"],
      ["02-logic-bloom.svg", "02", "Logic Bloom", "逻辑生长", "逻辑结构从开放核心向外生长，兼具生成感与生命力。"],
      ["03-agent-cycle.svg", "03", "Agent Cycle", "执行循环", "理解、行动、验证形成流动闭环，不依赖字母表达 Agent。"],
      ["04-prompt-pulse.svg", "04", "Prompt Pulse", "提示脉冲", "人的提示转化为推理波形，最终落到可执行光标。"],
      ["05-adaptive-stack.svg", "05", "Adaptive Stack", "上下文重组", "多层上下文动态对齐并转化成可执行结构。"],
      ["06-focus-shift.svg", "06", "Focus Shift", "精准聚焦", "从宽广项目上下文收敛到一次准确、已验证的代码修改。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file, no, name, tag, note]) => `
      <article class="card"><div class="head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="tag">${tag}</span></div>
      <div class="sample"><img class="mark" src="${file}" alt="${name}"><div class="wordmark"><strong>Code</strong><span>本地 AI 编程工作台</span></div></div>
      <div class="sample dark"><img class="mark" src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>Local coding workspace</span></div></div>
      <div class="foot"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div></article>`).join("");
  </script>
</body>
</html>
