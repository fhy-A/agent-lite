<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Round 2</title>
  <style>
    :root { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; color: #172033; background: #edf1f6; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { display: flex; align-items: end; justify-content: space-between; padding: 30px 36px 24px; border-bottom: 1px solid #d8dee8; background: #f8fafc; }
    h1 { margin: 0; font-size: 27px; letter-spacing: -.7px; }
    header p { margin: 7px 0 0; color: #697386; font-size: 13px; }
    .round { color: #2563eb; font: 700 11px Consolas, monospace; letter-spacing: .12em; }
    main { max-width: 1380px; margin: 0 auto; padding: 24px 30px 38px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 16px; }
    .concept { overflow: hidden; border: 1px solid #d9dfe8; border-radius: 14px; background: #fff; box-shadow: 0 10px 24px rgba(32, 45, 68, .055); }
    .concept-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 16px 18px 12px; border-bottom: 1px solid #e7eaf0; }
    .number { color: #2563eb; font: 800 11px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 16px; }
    .style { padding: 4px 7px; border-radius: 5px; background: #eff4fb; color: #617087; font-size: 10px; white-space: nowrap; }
    .sample { display: flex; min-height: 103px; align-items: center; gap: 14px; padding: 21px 19px; }
    .sample.dark { border-top: 1px solid #e7eaf0; background: #151719; color: #f6f7f9; }
    .mark { width: 54px; height: 54px; flex: 0 0 auto; }
    .wordmark strong { display: block; font-size: 20px; line-height: 1; letter-spacing: -.3px; }
    .wordmark span { display: block; margin-top: 6px; color: #7a8495; font-size: 11px; }
    .dark .wordmark span { color: #929aa7; }
    .foot { display: flex; align-items: center; justify-content: space-between; min-height: 58px; padding: 12px 17px; border-top: 1px solid #e7eaf0; background: #fbfcfd; }
    .note { max-width: 220px; color: #697386; font-size: 11px; line-height: 1.45; }
    .sizes { display: flex; align-items: center; gap: 9px; }
    .sizes img { display: block; }
    .s16 { width: 16px; height: 16px; }.s24 { width: 24px; height: 24px; }.s32 { width: 32px; height: 32px; }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 650px) { header { padding: 24px 20px; } main { padding: 18px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div><div class="round">CODE · LOGO ROUND 02</div><h1>六种品牌方向</h1><p>暂不替换正式资源；重点比较轮廓、气质和小尺寸辨识度。</p></div>
  </header>
  <main><section class="grid" id="grid"></section></main>
  <script>
    const concepts = [
      ["01-open-loop.svg", "01", "Open Loop", "极简 / 友好", "C 循环与光标块，最轻量、最产品化。"],
      ["02-code-brackets.svg", "02", "Code Brackets", "直接 / 工程", "代码括号与斜线，开发工具属性最明确。"],
      ["03-folded-c.svg", "03", "Folded C", "锐利 / 动势", "折叠丝带组成 C，轮廓独特、速度感强。"],
      ["04-pixel-c.svg", "04", "Pixel C", "模块 / 复古", "代码块拼成 C，强调构建与组合。"],
      ["05-local-orbit.svg", "05", "Local Orbit", "智能 / 系统", "本地核心与运行轨道，强调 Agent 工作流。"],
      ["06-terminal-card.svg", "06", "Terminal Card", "沉稳 / 专业", "终端窗口中的 C 命令，桌面应用感最强。"]
    ];
    document.querySelector("#grid").innerHTML = concepts.map(([file, no, name, style, note]) => `
      <article class="concept">
        <div class="concept-head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="style">${style}</span></div>
        <div class="sample"><img class="mark" src="${file}" alt="${name}"><div class="wordmark"><strong>Code</strong><span>本地 AI 编程工作台</span></div></div>
        <div class="sample dark"><img class="mark" src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>Local coding workspace</span></div></div>
        <div class="foot"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div>
      </article>`).join("");
  </script>
</body>
</html>
