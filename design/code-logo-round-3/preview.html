<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Terminal Cursor Refinement</title>
  <style>
    :root { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; color: #172033; background: #edf1f6; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 28px 38px 23px; border-bottom: 1px solid #d7dde7; background: #f9fafc; }
    .eyebrow { color: #2563eb; font: 700 11px Consolas, monospace; letter-spacing: .12em; }
    h1 { margin: 7px 0 6px; font-size: 28px; letter-spacing: -.7px; }
    header p { margin: 0; color: #697386; font-size: 13px; }
    main { max-width: 1260px; margin: 0 auto; padding: 25px 32px 42px; }
    .grid { display: grid; grid-template-columns: 1.35fr .9fr; gap: 17px; }
    .card { overflow: hidden; border: 1px solid #d9dfe8; border-radius: 15px; background: #fff; box-shadow: 0 12px 30px rgba(30, 44, 69, .055); }
    .card-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid #e6eaf0; }
    .card-head strong { font-size: 14px; }
    .tag { padding: 4px 8px; border-radius: 5px; background: #eaf2ff; color: #2563eb; font-size: 10px; }
    .hero { display: flex; min-height: 292px; align-items: center; justify-content: center; gap: 30px; padding: 28px; background: linear-gradient(145deg, #fff, #f4f7fb); }
    .hero img { width: 142px; height: 142px; }
    .hero-copy strong { display: block; font-size: 35px; letter-spacing: -1px; }
    .hero-copy span { display: block; margin-top: 8px; color: #697386; font-size: 13px; }
    .formula { margin-top: 28px; color: #2563eb; font: 700 13px Consolas, monospace; letter-spacing: .05em; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #e6eaf0; }
    .compare > div { display: flex; min-height: 112px; align-items: center; gap: 14px; padding: 20px; }
    .compare > div + div { border-left: 1px solid #e6eaf0; }
    .compare img { width: 58px; height: 58px; }
    .compare b { display: block; font-size: 13px; }
    .compare small { display: block; margin-top: 4px; color: #7a8495; font-size: 11px; }
    .context { display: flex; min-height: 104px; align-items: center; gap: 13px; padding: 20px; }
    .context.dark { background: #151719; color: #f6f7f9; }
    .context + .context { border-top: 1px solid #e6eaf0; }
    .context img { width: 48px; height: 48px; }
    .wordmark strong { display: block; font-size: 19px; }
    .wordmark span { display: block; margin-top: 4px; color: #7a8495; font-size: 11px; }
    .dark .wordmark span { color: #929aa7; }
    .sizes { display: flex; min-height: 119px; align-items: end; justify-content: center; gap: 26px; padding: 21px; border-top: 1px solid #e6eaf0; background: #fafbfd; }
    .size { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #7a8495; font: 10px Consolas, monospace; }
    .s16 { width: 16px; height: 16px; }.s20 { width: 20px; height: 20px; }.s24 { width: 24px; height: 24px; }.s32 { width: 32px; height: 32px; }.s48 { width: 48px; height: 48px; }
    .notes { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; overflow: hidden; border: 1px solid #d9dfe8; border-radius: 13px; background: #d9dfe8; }
    .note { padding: 17px 18px; background: #fff; }
    .note b { display: block; margin-bottom: 5px; font-size: 12px; }
    .note span { color: #697386; font-size: 11px; line-height: 1.5; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } .notes { grid-column: auto; grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><div class="eyebrow">CODE · LOGO REFINEMENT 06A</div><h1>Terminal Cursor</h1><p>去掉状态圆点，只保留 C 主体和输入光标。</p></header>
  <main class="grid">
    <section class="card">
      <div class="card-head"><strong>推荐彩色稿</strong><span class="tag">PRIMARY</span></div>
      <div class="hero"><img src="terminal-cursor.svg" alt="Terminal Cursor"><div class="hero-copy"><strong>Code</strong><span>本地 AI 编程工作台</span><div class="formula">C + _</div></div></div>
      <div class="compare">
        <div><img src="../code-logo-round-2/06-terminal-card.svg" alt="原方案"><div><b>原方案</b><small>顶部状态点较多</small></div></div>
        <div><img src="terminal-cursor.svg" alt="精修方案"><div><b>精修方案</b><small>只保留输入光标</small></div></div>
      </div>
    </section>
    <section class="card">
      <div class="card-head"><strong>实际环境</strong><span class="tag">CONTEXT</span></div>
      <div class="context"><img src="terminal-cursor.svg" alt=""><div class="wordmark"><strong>Code</strong><span>本地 AI 编程工作台</span></div></div>
      <div class="context dark"><img src="terminal-cursor.svg" alt=""><div class="wordmark"><strong>Code</strong><span>Local coding workspace</span></div></div>
      <div class="sizes">
        <div class="size"><img class="s16" src="terminal-cursor.svg" alt=""><span>16</span></div>
        <div class="size"><img class="s20" src="terminal-cursor.svg" alt=""><span>20</span></div>
        <div class="size"><img class="s24" src="terminal-cursor.svg" alt=""><span>24</span></div>
        <div class="size"><img class="s32" src="terminal-cursor.svg" alt=""><span>32</span></div>
        <div class="size"><img class="s48" src="terminal-cursor.svg" alt=""><span>48</span></div>
      </div>
    </section>
    <section class="notes">
      <div class="note"><b>主体</b><span>白色 C 是唯一主轮廓，减少识别噪声。</span></div>
      <div class="note"><b>功能符号</b><span>蓝色短横线代表等待输入的终端光标。</span></div>
      <div class="note"><b>单色适配</b><span>打印与受限环境使用纯白 C_ 版本。</span></div>
    </section>
  </main>
</body>
</html>
