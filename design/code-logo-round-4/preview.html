<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Logo · Distinctive Terminal Variants</title>
  <style>
    :root { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; color: #172033; background: #edf1f6; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 27px 36px 22px; border-bottom: 1px solid #d8dee8; background: #f9fafc; }
    .eyebrow { color: #2563eb; font: 700 11px Consolas, monospace; letter-spacing: .12em; }
    h1 { margin: 7px 0 6px; font-size: 27px; letter-spacing: -.7px; }
    header p { margin: 0; color: #697386; font-size: 13px; }
    main { max-width: 1280px; margin: 0 auto; padding: 23px 30px 40px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(360px, 1fr)); gap: 16px; }
    .card { overflow: hidden; border: 1px solid #d9dfe8; border-radius: 14px; background: #fff; box-shadow: 0 10px 26px rgba(29, 43, 67, .055); }
    .head { display: flex; align-items: flex-start; justify-content: space-between; padding: 15px 18px 13px; border-bottom: 1px solid #e6eaf0; }
    .number { color: #2563eb; font: 800 10px Consolas, monospace; }
    h2 { margin: 3px 0 0; font-size: 16px; }
    .tag { padding: 4px 7px; border-radius: 5px; background: #eff4fb; color: #637189; font-size: 10px; }
    .samples { display: grid; grid-template-columns: 1fr 1fr; }
    .sample { display: flex; min-height: 126px; align-items: center; gap: 15px; padding: 20px; }
    .sample.dark { background: #151719; color: #f7f8fa; }
    .mark { width: 66px; height: 66px; flex: 0 0 auto; }
    .wordmark strong { display: block; font-size: 20px; letter-spacing: -.3px; }
    .wordmark span { display: block; margin-top: 5px; color: #7c8798; font-size: 10px; }
    .dark .wordmark span { color: #929aa7; }
    .foot { display: flex; min-height: 67px; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 17px; border-top: 1px solid #e6eaf0; background: #fbfcfd; }
    .note { max-width: 330px; color: #697386; font-size: 11px; line-height: 1.45; }
    .sizes { display: flex; align-items: center; gap: 9px; }
    .sizes img { display: block; }.s16 { width: 16px; height: 16px; }.s24 { width: 24px; height: 24px; }.s32 { width: 32px; height: 32px; }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><div class="eyebrow">CODE · LOGO REFINEMENT 06B</div><h1>让功能符号参与 C 的结构</h1><p>保留沉稳的终端卡片，比较四种更具专属轮廓的构造方式。</p></header>
  <main><section class="grid" id="grid"></section></main>
  <script>
    const variants = [
      ["01-cursor-ligature.svg", "01", "Cursor Ligature", "融合", "把 C 的下端直接变成蓝色光标，单一轮廓、最克制。"],
      ["02-prompt-gate.svg", "02", "Prompt Gate", "语义", "命令箭头嵌入 C 的开口，Code 与执行含义最直接。"],
      ["03-angular-c.svg", "03", "Angular C", "轮廓", "把圆弧改为折线路径，工具感更强且远看更独特。"],
      ["04-code-slash.svg", "04", "Code Slash", "符号", "用斜线穿过 C 的开口，形成接近 C/ 的专属合字。"]
    ];
    document.querySelector("#grid").innerHTML = variants.map(([file, no, name, tag, note]) => `
      <article class="card">
        <div class="head"><div><span class="number">${no}</span><h2>${name}</h2></div><span class="tag">${tag}</span></div>
        <div class="samples">
          <div class="sample"><img class="mark" src="${file}" alt="${name}"><div class="wordmark"><strong>Code</strong><span>本地 AI 编程工作台</span></div></div>
          <div class="sample dark"><img class="mark" src="${file}" alt=""><div class="wordmark"><strong>Code</strong><span>Local coding workspace</span></div></div>
        </div>
        <div class="foot"><div class="note">${note}</div><div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div></div>
      </article>`).join("");
  </script>
</body>
</html>
