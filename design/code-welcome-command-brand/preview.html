<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code · 命令光标生成品牌名</title>
  <style>
    :root { color: #111318; background: #eef1f5; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 24px 34px; border-bottom: 1px solid #d8dee7; background: #fafbfc; }
    .eyebrow { color: #778191; font: 700 10px Consolas, monospace; letter-spacing: .14em; }
    h1 { margin: 6px 0 0; font-size: 21px; }
    button { padding: 8px 13px; border: 1px solid #cdd4de; border-radius: 8px; background: #fff; color: #2b323d; font: 600 12px inherit; cursor: pointer; }
    main { display: grid; min-height: calc(100vh - 86px); padding: 32px; place-items: center; }
    .demo { position: relative; width: min(760px, calc(100vw - 64px)); min-height: 480px; overflow: hidden; border: 1px solid #d4dae4; border-radius: 20px; background: #fbfcfd; box-shadow: 0 22px 60px rgba(24,32,44,.08); }
    .brand-lockup { position: absolute; top: 148px; left: 50%; display: flex; width: max-content; align-items: flex-end; gap: 24px; transform: translateX(-50%); }
    .command-line { position: relative; width: 130px; height: 58px; flex: 0 0 130px; }
    .prompt { position: absolute; top: 12px; left: -37px; color: #111318; font: 700 34px/1 Consolas, monospace; opacity: 0; transform: translateX(-12px); }
    .play .prompt { animation: promptIn .3s ease .08s forwards, promptOut .22s ease 1.68s forwards; }
    .typed-brand { position: absolute; top: 0; left: 0; width: 130px; height: 54px; overflow: visible; color: #070809; }
    .typed-brand .letter { opacity: 0; }
    .typed-brand .letter.is-visible { opacity: 1; }
    .brand-caret { position: absolute; top: 3px; left: -2px; width: 3px; height: 43px; background: #111318; opacity: 0; }
    .play .brand-caret { animation: caretType 1.5s step-end .32s forwards; }
    .brand-caret.is-finished { visibility: hidden; }
    .travel-caret { position: absolute; top: 0; left: 0; z-index: 3; width: 3px; height: 49px; background: #111318; opacity: 0; transform-origin: 50% 0; will-change: transform, opacity; }
    .slogan { margin-bottom: 14px; color: #707988; font-size: 16px; line-height: 1; letter-spacing: .02em; clip-path: inset(0 100% 0 0); white-space: nowrap; }
    .play .slogan { animation: revealSlogan .78s cubic-bezier(.4,0,.2,1) 2.155s forwards; }
    .composer-frame { position: absolute; top: 276px; left: 50%; width: min(610px, calc(100% - 64px)); height: 92px; padding: 19px 20px; border: 1px solid #cfd5df; border-radius: 15px; background: #fff; color: #89919e; font-size: 13px; transform: translateX(-50%); box-shadow: 0 16px 38px rgba(20,29,41,.08); }
    .composer-frame::after { content: ""; position: absolute; right: 0; bottom: 31px; left: 0; height: 1px; background: #e4e7ec; }
    .input-caret { position: absolute; top: 18px; left: 20px; width: 2px; height: 19px; background: #111318; opacity: 0; }
    .placeholder { display: inline-block; margin-left: 9px; transition: opacity .2s; }
    .play .input-caret { animation: inputCaret .2s ease var(--input-delay, 3.38s) forwards; }
    .play .placeholder { animation: placeholderDim .3s ease var(--placeholder-delay, 3.36s) forwards; }
    .motion-note { position: absolute; right: 18px; bottom: 15px; color: #9aa2ae; font: 9px Consolas, monospace; letter-spacing: .08em; }
    @keyframes promptIn { to { opacity: 1; transform: none; } }
    @keyframes promptOut { to { opacity: 0; transform: translateX(8px); } }
    @keyframes caretType {
      0% { left: -2px; opacity: 1; }
      18% { left: 40px; opacity: 1; }
      37% { left: 71px; opacity: 1; }
      56% { left: 101px; opacity: 1; }
      75%, 96% { left: 130px; opacity: 1; }
      100% { left: 130px; opacity: 0; }
    }
    @keyframes revealSlogan { to { clip-path: inset(0 0 0 0); } }
    @keyframes inputCaret { to { opacity: 1; } }
    @keyframes placeholderDim { to { opacity: .62; } }
    @media (prefers-reduced-motion: reduce) { .prompt, .travel-caret, .brand-caret { display: none; } .typed-brand .letter, .input-caret { animation: none !important; opacity: 1; transform: none; } .slogan { animation: none !important; clip-path: none; } }
    @media (max-width: 700px) { .travel-caret { display: none; } .play .input-caret, .play .placeholder { animation-delay: 2.98s; } }
    @media (max-width: 560px) { header { padding-inline: 20px; } main { padding: 18px; } .demo { width: 100%; min-height: 440px; } .brand-lockup { gap: 18px; transform: translateX(-50%) scale(.82); } }
  </style>
</head>
<body>
  <header><div><div class="eyebrow">02 · COMMAND-TO-BRAND</div><h1>命令光标生成品牌名</h1></div><button id="replay" type="button">重新播放</button></header>
  <main>
    <section class="demo play" id="demo">
      <div class="brand-lockup"><div class="command-line"><span class="prompt">&gt;</span><svg class="typed-brand" viewBox="0 0 130 54" role="img" aria-label="Code"><g class="letter c" transform="translate(0 44) scale(.0263671875 -.0263671875)"><path fill="currentColor" d="M774-20Q572-20 412.5 69Q253 158 160.5 328.5Q68 499 68 744Q68 990 161.5 1161.5Q255 1333 415.5 1421.5Q576 1510 774 1510Q909 1510 1024 1472.5Q1139 1435 1226.5 1363Q1314 1291 1368 1187Q1422 1083 1436 949H1072Q1065 1005 1042.5 1050.5Q1020 1096 982.5 1128Q945 1160 895 1177.5Q845 1195 783 1195Q675 1195 597 1141.5Q519 1088 477 987.5Q435 887 435 744Q435 597 477.5 496.5Q520 396 597.5 345.5Q675 295 782 295Q841 295 890 310.5Q939 326 976.5 355.5Q1014 385 1038.5 427.5Q1063 470 1072 524H1436Q1426 425 1379 328Q1332 231 1248.5 152.5Q1165 74 1046 27Q927-20 774-20Z"/></g><g class="letter o" transform="translate(37.66 44) scale(.0263671875 -.0263671875)"><path fill="currentColor" d="M605-21Q429-21 303 51.5Q177 124 109.5 253.5Q42 383 42 555Q42 728 109.5 857.5Q177 987 303 1059.5Q429 1132 605 1132Q781 1132 907.5 1059.5Q1034 987 1101.5 857.5Q1169 728 1169 555Q1169 383 1101.5 253.5Q1034 124 907.5 51.5Q781-21 605-21ZM607 250Q672 250 716 288Q760 326 783.5 395.5Q807 465 807 557Q807 650 783.5 718Q760 786 716 823.5Q672 861 607 861Q542 861 496 823.5Q450 786 427 718Q404 650 404 557Q404 465 427 395.5Q450 326 496 288Q542 250 607 250Z"/></g><g class="letter d" transform="translate(67.69 44) scale(.0263671875 -.0263671875)"><path fill="currentColor" d="M488-16Q365-16 263.5 48Q162 112 102 240Q42 368 42 558Q42 755 104.5 882Q167 1009 268 1070.5Q369 1132 486 1132Q574 1132 636.5 1102Q699 1072 740 1024.5Q781 977 802 926H809V1490H1165V0H814V182H802Q779 130 738 85Q697 40 635 12Q573-16 488-16ZM611 261Q676 261 722 298Q768 335 793 401.5Q818 468 818 558Q818 650 793.5 716.5Q769 783 722.5 819Q676 855 611 855Q546 855 500 818Q454 781 430.5 714.5Q407 648 407 558Q407 469 431 402Q455 335 500.5 298Q546 261 611 261Z"/></g><g class="letter e" transform="translate(98.74 44) scale(.0263671875 -.0263671875)"><path fill="currentColor" d="M607-21Q431-21 304 48.5Q177 118 109.5 247Q42 376 42 555Q42 728 110 857.5Q178 987 302 1059.5Q426 1132 594 1132Q713 1132 812.5 1094.5Q912 1057 984.5 984.5Q1057 912 1096.5 806Q1136 700 1136 561V473H165V678H967L801 630Q801 707 778 761.5Q755 816 710 846Q665 876 598 876Q531 876 485 846Q439 816 415 762.5Q391 709 391 636V489Q391 411 418.5 354Q446 297 496.5 266.5Q547 236 613 236Q659 236 697 249Q735 262 762 287.5Q789 313 803 349L1129 340Q1109 230 1041 149Q973 68 863 23.5Q753-21 607-21Z"/></g></svg><span class="brand-caret"></span></div><div class="slogan">把想法变成可运行的代码</div></div>
      <span class="travel-caret" aria-hidden="true"></span>
      <div class="composer-frame"><span class="input-caret"></span><span class="placeholder">描述需求、粘贴代码，或输入 / 调用命令</span></div>
      <div class="motion-note">ONE-SHOT · ADAPTIVE</div>
    </section>
  </main>
  <script>
    const demo = document.querySelector("#demo");
    const brandCaret = document.querySelector(".brand-caret");
    const typedBrand = document.querySelector(".typed-brand");
    const travelCaret = document.querySelector(".travel-caret");
    const inputCaret = document.querySelector(".input-caret");
    const slogan = document.querySelector(".slogan");
    const motionNote = document.querySelector(".motion-note");
    const brandLetters = [...document.querySelectorAll(".typed-brand .letter")];
    const letterDelays = [590, 875, 1160, 1445];
    const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)");
    let letterTimers = [];
    let handoffTimer;
    let travelTimer;
    let travelFinishTimer;
    let travelAnimation;

    function playLetters() {
      letterTimers.forEach(clearTimeout);
      brandLetters.forEach((letter) => letter.classList.remove("is-visible"));
      if (reduceMotion.matches) {
        brandLetters.forEach((letter) => letter.classList.add("is-visible"));
        return;
      }
      letterTimers = brandLetters.map((letter, index) => setTimeout(() => {
        letter.classList.add("is-visible");
      }, letterDelays[index]));
    }

    function bezierPoint(t, start, controlA, controlB, end) {
      const inverse = 1 - t;
      return inverse ** 3 * start
        + 3 * inverse ** 2 * t * controlA
        + 3 * inverse * t ** 2 * controlB
        + t ** 3 * end;
    }

    function playCursorTravel() {
      clearTimeout(handoffTimer);
      clearTimeout(travelTimer);
      clearTimeout(travelFinishTimer);
      travelAnimation?.cancel();
      brandCaret.classList.remove("is-finished");
      travelCaret.removeAttribute("style");
      if (reduceMotion.matches || innerWidth <= 700) {
        motionNote.textContent = "ONE-SHOT · 3.3s";
        return;
      }

      const initialSloganRect = slogan.getBoundingClientRect();
      const initialInputRect = inputCaret.getBoundingClientRect();
      const finalDistance = Math.hypot(
        initialInputRect.left - initialSloganRect.right - 7,
        initialInputRect.top - initialSloganRect.top
      );
      const finalDuration = Math.min(600, Math.max(440, finalDistance / .9));
      const approachDuration = 335;
      const revealDuration = 780;
      const travelDuration = approachDuration + revealDuration + finalDuration;
      const approachEnd = approachDuration / travelDuration;
      const revealEnd = (approachDuration + revealDuration) / travelDuration;
      const inputDelay = 1820 + travelDuration - 80;
      demo.style.setProperty("--input-delay", `${inputDelay}ms`);
      demo.style.setProperty("--placeholder-delay", `${inputDelay - 20}ms`);
      motionNote.textContent = `ONE-SHOT · ${((inputDelay + 280) / 1000).toFixed(1)}s`;

      handoffTimer = setTimeout(() => brandCaret.classList.add("is-finished"), 1820);
      travelTimer = setTimeout(() => {
        const demoRect = demo.getBoundingClientRect();
        const typedBrandRect = typedBrand.getBoundingClientRect();
        travelCaret.style.left = `${typedBrandRect.right - demoRect.left}px`;
        travelCaret.style.top = `${typedBrandRect.top - demoRect.top + 7}px`;
        const from = travelCaret.getBoundingClientRect();
        const to = inputCaret.getBoundingClientRect();
        const sloganRect = slogan.getBoundingClientRect();
        const sloganStart = {
          x: sloganRect.left - from.left - 7,
          y: sloganRect.top - from.top
        };
        const sloganEnd = {
          x: sloganRect.right - from.left + 7,
          y: sloganStart.y
        };
        const inputEnd = {
          x: to.left - from.left,
          y: to.top - from.top
        };
        const sloganScale = Math.max(.36, sloganRect.height / from.height);
        const inputScale = Math.max(.34, to.height / from.height);
        const frames = [];

        [0, .2, .42, .65, .82, 1].forEach((t) => {
          const x = bezierPoint(t, 0, sloganStart.x * .3, sloganStart.x * .78, sloganStart.x);
          const y = bezierPoint(t, 0, sloganStart.y * .25, sloganStart.y * .78, sloganStart.y);
          frames.push({
            offset: approachEnd * t,
            opacity: 1,
            transform: `translate(${x}px, ${y}px) scaleY(${1 + (sloganScale - 1) * t})`
          });
        });

        [0, .2, .4, .6, .8, 1].forEach((t) => {
          const x = sloganStart.x + (sloganEnd.x - sloganStart.x) * t;
          frames.push({
            offset: approachEnd + (revealEnd - approachEnd) * t,
            opacity: 1,
            transform: `translate(${x}px, ${sloganStart.y}px) scaleY(${sloganScale})`
          });
        });

        [0, .18, .38, .6, .8, .93, 1].forEach((t) => {
          const x = bezierPoint(t, sloganEnd.x, sloganEnd.x + 30, inputEnd.x + 112, inputEnd.x);
          const y = bezierPoint(t, sloganEnd.y, sloganEnd.y + 36, inputEnd.y - 24, inputEnd.y);
          frames.push({
            offset: revealEnd + (1 - revealEnd) * t,
            opacity: t < .93 ? 1 : Math.max(0, (1 - t) / .07),
            transform: `translate(${x}px, ${y}px) scaleY(${sloganScale + (inputScale - sloganScale) * t})`
          });
        });
        travelAnimation = travelCaret.animate(frames, {
          duration: travelDuration,
          easing: "linear",
          fill: "forwards"
        });
        travelFinishTimer = setTimeout(() => {
          travelCaret.style.visibility = "hidden";
        }, travelDuration);
      }, 1820);
    }

    playLetters();
    playCursorTravel();
    document.querySelector("#replay").addEventListener("click", () => {
      letterTimers.forEach(clearTimeout);
      clearTimeout(handoffTimer);
      clearTimeout(travelTimer);
      clearTimeout(travelFinishTimer);
      travelAnimation?.cancel();
      demo.classList.remove("play");
      void demo.offsetWidth;
      demo.classList.add("play");
      playLetters();
      playCursorTravel();
    });
  </script>
</body>
</html>
