<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code · 动态字标实验</title>
  <style>
    :root { color: #111318; background: #eef1f5; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 24px 34px; border-bottom: 1px solid #d8dee7; background: #fafbfc; }
    .eyebrow { color: #778191; font: 700 10px Consolas, monospace; letter-spacing: .14em; }
    h1 { margin: 6px 0 0; font-size: 21px; }
    button { padding: 8px 13px; border: 1px solid #cdd4de; border-radius: 8px; background: #fff; color: #2b323d; font: 600 12px inherit; cursor: pointer; }
    main { display: grid; min-height: calc(100vh - 86px); padding: 32px; place-items: center; }
    .demo { position: relative; display: flex; width: min(760px, calc(100vw - 64px)); min-height: 480px; overflow: hidden; align-items: center; justify-content: center; flex-direction: column; border: 1px solid #d4dae4; border-radius: 20px; background: #fbfcfd; box-shadow: 0 22px 60px rgba(24,32,44,.08); }
    .demo::before, .demo::after { content: ""; position: absolute; pointer-events: none; }
    .demo::before { top: 48px; bottom: 48px; left: 50%; width: 1px; background: linear-gradient(transparent, rgba(96,107,123,.13), transparent); }
    .demo::after { right: 48px; left: 48px; top: 50%; height: 1px; background: linear-gradient(90deg, transparent, rgba(96,107,123,.10), transparent); }
    .brand { position: relative; z-index: 1; display: flex; height: 80px; align-items: center; justify-content: center; gap: 0; color: #070809; font-size: 68px; line-height: 1; font-weight: 800; letter-spacing: -5px; }
    .letter { display: inline-block; min-width: .58em; opacity: 0; filter: blur(6px); will-change: transform, opacity, filter; }
    .letter.c { transform: translate(78px,-58px) rotate(28deg) scale(.78); }
    .letter.o { transform: translate(-64px,56px) rotate(-30deg) scale(.72); }
    .letter.d { transform: translateY(-50px) scaleY(.25); transform-origin: bottom; }
    .letter.e { transform: translate(56px,18px) skewX(-28deg) scale(.8); }
    .play .letter.c { animation: arriveC 1.05s cubic-bezier(.2,.78,.22,1) .05s forwards; }
    .play .letter.o { animation: arriveO 1.05s cubic-bezier(.2,.78,.22,1) .14s forwards; }
    .play .letter.d { animation: arriveD .9s cubic-bezier(.2,.78,.22,1) .27s forwards; }
    .play .letter.e { animation: arriveE .86s cubic-bezier(.2,.78,.22,1) .39s forwards; }
    .slogan { position: relative; z-index: 1; margin-top: 15px; color: #707988; font-size: 16px; letter-spacing: .02em; opacity: 0; transform: translateY(10px); }
    .play .slogan { animation: revealText .65s ease 1.05s forwards; }
    .composer-frame { position: relative; z-index: 1; display: flex; width: min(610px, calc(100% - 64px)); height: 92px; margin-top: 52px; align-items: flex-start; padding: 19px 20px; border: 1px solid #cfd5df; border-radius: 15px; background: #fff; color: #89919e; font-size: 13px; opacity: 0; transform: translateY(18px); box-shadow: 0 16px 38px rgba(20,29,41,.08); }
    .composer-frame::after { content: ""; position: absolute; right: 0; bottom: 31px; left: 0; height: 1px; background: #e4e7ec; }
    .play .composer-frame { animation: revealComposer .72s cubic-bezier(.2,.7,.2,1) 1.22s forwards; }
    .motion-note { position: absolute; right: 18px; bottom: 15px; color: #9aa2ae; font: 9px Consolas, monospace; letter-spacing: .08em; }
    @keyframes arriveC { 0% { opacity: 0; filter: blur(6px); transform: translate(78px,-58px) rotate(28deg) scale(.78); } 72% { opacity: 1; filter: blur(0); transform: translate(-3px,2px) rotate(-2deg) scale(1.04); } 100% { opacity: 1; filter: blur(0); transform: none; } }
    @keyframes arriveO { 0% { opacity: 0; filter: blur(6px); transform: translate(-64px,56px) rotate(-30deg) scale(.72); } 72% { opacity: 1; filter: blur(0); transform: translate(2px,-2px) rotate(2deg) scale(1.04); } 100% { opacity: 1; filter: blur(0); transform: none; } }
    @keyframes arriveD { 0% { opacity: 0; filter: blur(4px); transform: translateY(-50px) scaleY(.25); } 76% { opacity: 1; filter: blur(0); transform: translateY(2px) scaleY(1.04); } 100% { opacity: 1; filter: blur(0); transform: none; } }
    @keyframes arriveE { 0% { opacity: 0; filter: blur(5px); transform: translate(56px,18px) skewX(-28deg) scale(.8); } 76% { opacity: 1; filter: blur(0); transform: translate(-2px,0) skewX(2deg) scale(1.03); } 100% { opacity: 1; filter: blur(0); transform: none; } }
    @keyframes revealText { to { opacity: 1; transform: none; } }
    @keyframes revealComposer { to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .letter, .slogan, .composer-frame { animation: none !important; opacity: 1; filter: none; transform: none; } }
    @media (max-width: 560px) { header { padding-inline: 20px; } main { padding: 18px; } .demo { width: 100%; min-height: 440px; } .brand { font-size: 54px; } }
  </style>
</head>
<body>
  <header><div><div class="eyebrow">01 · KINETIC WORDMARK</div><h1>动态字标</h1></div><button id="replay" type="button">重新播放</button></header>
  <main>
    <section class="demo play" id="demo">
      <div class="brand" aria-label="Code"><span class="letter c">C</span><span class="letter o">o</span><span class="letter d">d</span><span class="letter e">e</span></div>
      <div class="slogan">把想法变成可运行的代码</div>
      <div class="composer-frame">描述需求、粘贴代码，或输入 / 调用命令</div>
      <div class="motion-note">ONE-SHOT · 1.9s</div>
    </section>
  </main>
  <script>
    const demo = document.querySelector("#demo");
    document.querySelector("#replay").addEventListener("click", () => {
      demo.classList.remove("play");
      void demo.offsetWidth;
      demo.classList.add("play");
    });
  </script>
</body>
</html>
