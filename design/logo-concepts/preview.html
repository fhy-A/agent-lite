<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Lite Logo Concepts</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef1f5; color: #172033; }
    header { padding: 34px 40px 28px; border-bottom: 1px solid #d9dee7; background: #fff; }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    header p { margin: 0; color: #697386; }
    main { max-width: 1440px; margin: 0 auto; padding: 28px 32px 48px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(260px, 1fr)); gap: 18px; }
    .concept { overflow: hidden; border: 1px solid #d8dee8; border-radius: 8px; background: #fff; box-shadow: 0 5px 18px rgba(27, 39, 61, .06); }
    .sample { display: flex; align-items: center; gap: 14px; min-height: 112px; padding: 24px; }
    .sample.dark { background: #181818; color: #f3f4f6; }
    .mark { width: 56px; height: 56px; flex: 0 0 auto; }
    .wordmark strong { display: block; font-size: 20px; letter-spacing: 0; }
    .wordmark span { display: block; margin-top: 4px; color: #7c8799; font-size: 12px; }
    .dark .wordmark span { color: #a3abb8; }
    .meta { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-top: 1px solid #e4e8ee; }
    .meta h2 { margin: 0; font-size: 15px; }
    .sizes { display: flex; align-items: center; gap: 10px; }
    .sizes img { display: block; image-rendering: auto; }
    .s16 { width: 16px; height: 16px; }
    .s24 { width: 24px; height: 24px; }
    .s32 { width: 32px; height: 32px; }
    @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 620px) { header { padding: 26px 20px; } main { padding: 20px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Agent Lite Logo 方向稿</h1>
    <p>每套均展示亮色导航、暗色导航，以及 16 / 24 / 32px 小尺寸辨识度。</p>
  </header>
  <main><section class="grid" id="concepts"></section></main>
  <script>
    const concepts = [
      ["01-aperture.svg", "01 · Split Apex", "延续原图 / 断点形成独特轮廓"],
      ["02-prompt-core.svg", "02 · Ribbon A", "折叠带 / 层次感 / 稳定识别"],
      ["03-local-orbit.svg", "03 · Portal A", "入口 / 本地工作空间 / 极简"],
      ["04-agent-nodes.svg", "04 · Cut A", "横向切面 / 快速 / 技术感"],
      ["05-linked-brackets.svg", "05 · A Cursor", "Agent A / 操作指针 / 交互"],
      ["06-code-beacon.svg", "06 · AL Monogram", "A 与 L 合字 / 产品专属"]
    ];
    document.querySelector("#concepts").innerHTML = concepts.map(([file, name, note]) => `
      <article class="concept">
        <div class="sample">
          <img class="mark" src="${file}" alt="${name}">
          <div class="wordmark"><strong>Agent Lite</strong><span>${note}</span></div>
        </div>
        <div class="sample dark">
          <img class="mark" src="${file}" alt="">
          <div class="wordmark"><strong>Agent Lite</strong><span>本地编程 Agent</span></div>
        </div>
        <div class="meta">
          <h2>${name}</h2>
          <div class="sizes"><img class="s16" src="${file}" alt=""><img class="s24" src="${file}" alt=""><img class="s32" src="${file}" alt=""></div>
        </div>
      </article>`).join("");
  </script>
</body>
</html>
